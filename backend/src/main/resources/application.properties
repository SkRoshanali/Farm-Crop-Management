spring.application.name=farm-crop-management
spring.profiles.active=dev

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.com.farmcrop=INFO
logging.level.org.springframework.security=WARN

# JWT - SECURITY WARNING: Use environment variables in production!
app.jwt.secret=${JWT_SECRET:farm_crop_super_secret_key_for_jwt_2024_must_be_256_bits_long_at_least}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never
